<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4399 小号获取器</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f9f9f9;
        }
        .box { 
            display: inline-block; 
            text-align: left; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            min-width: 300px;
        }
        h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        #fetchBtn { 
            display: block;
            width: 100%;
            padding: 12px 20px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            transition: background 0.3s;
        }
        #fetchBtn:hover { 
            background: #0056b3; 
        }
        #fetchBtn:active {
            transform: scale(0.98);
        }
        #fetchBtn:disabled {
            background: #a0cfff;
            cursor: not-allowed;
        }
        .result { 
            margin-top: 20px; 
            font-weight: bold; 
            color: #555;
            text-align: center;
            min-height: 24px;
        }
        .author {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #e0e0e0;
            font-size: 14px;
            color: #888;
            text-align: center;
            letter-spacing: 1px;
        }
        .bilibili-link {
            color: #fb7299; 
            font-weight: bold;
            text-decoration: none; 
            transition: all 0.3s ease; 
        }
        .bilibili-link:hover {
            color: #e65c85; 
            text-decoration: underline; 
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>🎮 4399 小号获取</h3>
    <button id="fetchBtn">点击获取账号</button>
    <div class="result" id="result">等待获取...</div>
    
    <div class="author">
        By <a href="https://space.bilibili.com/3493087443683786" target="_blank" class="bilibili-link">B站@祁宇晨66</a>
    </div>
</div>

<script>
    const fetchBtn = document.getElementById('fetchBtn');
    const resultDiv = document.getElementById('result');

    const apiKeys = [
        "bed330ef-30f1-4578-9351-4806de50ab7d",
        "a526230c-fbc2-4846-a10e-563c59cd91b9"
    ];
    let currentKeyIndex = 0;

    async function fetchAccount() {
        fetchBtn.disabled = true;
        fetchBtn.innerText = "获取中...";
        resultDiv.innerText = "正在获取中，请稍候...";
        
        let attemptedKeys = 0;
        let success = false;

        while (attemptedKeys < apiKeys.length && !success) {
            const apiKey = apiKeys[currentKeyIndex];
            const apiUrl = `https://4399.nekoinsi.de/api/alt?userApiKey=${apiKey}`;

            try {
                const response = await fetch(apiUrl, { method: 'GET' });
                const data = await response.json();

                if (data.code === 0) {
                    const accountString = data.data[0]; 
                    const parts = accountString.split("----");
                    
                    if (parts.length >= 2) {
                        resultDiv.innerHTML = `
                            <p style="color: #28a745; margin-bottom: 10px;">✅ 获取成功！</p>
                            <p style="margin: 5px 0;">👤 账号: <strong>${parts[0]}</strong></p>
                            <p style="margin: 5px 0;">🔑 密码: <strong>${parts[1]}</strong></p>
                        `;
                        success = true;
                    } else {
                        resultDiv.innerText = `获取成功但格式异常: ${accountString}`;
                        success = true;
                    }
                } else {
                    let errorMsg = data.message || "未知错误";
                    if (errorMsg === "Daily limit reached" || errorMsg.toLowerCase().includes("limit")) {
                        resultDiv.innerText = "当前线路达到限制，正在自动切换备用线路...";
                        currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
                        attemptedKeys++;
                        await new Promise(resolve => setTimeout(resolve, 500));
                    } else {
                        resultDiv.innerHTML = `<p style="color: #dc3545; margin: 0;">❌ 获取失败: ${errorMsg}</p>`;
                        success = true;
                    }
                }
            } catch (error) {
                if (attemptedKeys < apiKeys.length - 1) {
                    resultDiv.innerText = "网络请求异常，正在切换备用线路...";
                    currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
                    attemptedKeys++;
                    await new Promise(resolve => setTimeout(resolve, 500));
                } else {
                    resultDiv.innerHTML = `<p style="color: #dc3545; margin: 0;">❌ 网络请求出错，请检查网络。</p>`;
                    success = true;
                }
                console.error(error);
            }
        }

        if (!success) {
            resultDiv.innerHTML = `<p style="color: #dc3545; margin: 0;">❌ 获取失败: 今日所有线路获取次数均已达上限，请明天再试！</p>`;
        }

        fetchBtn.disabled = false;
        fetchBtn.innerText = "点击获取账号";
    }

    fetchBtn.addEventListener('click', fetchAccount);
</script>

</body>
</html>
